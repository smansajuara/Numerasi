<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Numerasi - Smansa juara</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0c1445 0%, #1a237e 50%, #0d1b4b 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .container { width: 100%; max-width: 520px; }
    .badge {
      display: inline-block;
      background: rgba(99,179,237,0.2);
      border: 1px solid rgba(99,179,237,0.4);
      color: #90cdf4;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 20px;
      margin-bottom: 14px;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 48px;
      color: #fff;
      margin-bottom: 6px;
    }
    .subtitle { font-size: 14px; color: rgba(255,255,255,0.4); margin-bottom: 36px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 24px 20px;
      text-decoration: none;
      display: block;
      position: relative;
      overflow: hidden;
      transition: all 0.25s;
    }
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(99,179,237,0.08), transparent);
      opacity: 0;
      transition: opacity 0.25s;
    }
    .card:hover {
      background: rgba(255,255,255,0.11);
      border-color: rgba(99,179,237,0.5);
      transform: translateY(-3px);
    }
    .card:hover::before { opacity: 1; }
    .icon {
      width: 44px; height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, #2b6cb0, #63b3ed);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      margin-bottom: 16px;
    }
    .card-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #63b3ed;
      margin-bottom: 6px;
    }
    .card-title {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      line-height: 1.3;
      margin-bottom: 10px;
    }
    .card-date {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
    }
    .arrow {
      position: absolute;
      bottom: 20px; right: 20px;
      width: 30px; height: 30px;
      border-radius: 50%;
      background: rgba(99,179,237,0.15);
      display: flex; align-items: center; justify-content: center;
      color: #63b3ed;
      font-size: 16px;
      transition: all 0.2s;
    }
    .card:hover .arrow {
      background: rgba(99,179,237,0.3);
      transform: translate(2px, -2px);
    }
    .footer {
      text-align: center;
      margin-top: 30px;
      font-size: 12px;
      color: rgba(255,255,255,0.2);
    }
    @media (max-width: 480px) {
      .grid { grid-template-columns: 1fr; }
      h1 { font-size: 36px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">Belajar Numerasi</div>
    <h1>Numerasi</h1>
    <p class="subtitle">SMA N 1 Pemalang</p>

    <div class="grid">
      <a href="Numerasi_2026.04.30.html" class="card">
        <div class="icon">📐</div>
        <div class="card-label">. . .</div>
        <div class="card-title">Numerasi 30 April</div>
        <div class="card-date">30 April 2026</div>
        <div class="arrow">→</div>
      </a>

      <a href="Numerasi_2026.05.07.html" class="card">
        <div class="icon">📊</div>
        <div class="card-label">. . .</div>
        <div class="card-title">Numerasi 07 Mei</div>
        <div class="card-date">07 Mei 2026</div>
        <div class="arrow">→</div>
      </a>
    </div>

    <div class="footer">smansajuara · 2026</div>
  </div>
</body>
</html>
