<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Numerasi Trigonometri 2026</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --success: #22c55e; --danger: #ef4444; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .card { background: white; width: 100%; max-width: 650px; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .hidden { display: none; }
        .fullscreen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1000; background: white; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        svg { max-width: 100%; height: auto; margin: 15px 0; border: 1px solid #eee; border-radius: 8px; background: white; }
        .opt-btn { display: block; width: 100%; text-align: left; padding: 12px; margin: 8px 0; border: 1px solid #e2e8f0; border-radius: 6px; background: white; cursor: pointer; transition: 0.2s; font-size: 1.1em; }
        .opt-btn:hover { background: #eff6ff; border-color: var(--primary); }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; }
        
        /* Review Styling */
        .explanation-item { border: 1px solid #e5e7eb; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.85em; font-weight: bold; margin-bottom: 10px; }
        .status-correct { background: #dcfce7; color: #166534; }
        .status-wrong { background: #fee2e2; color: #991b1b; }
        .solution-box { background: #f1f5f9; padding: 12px; border-left: 4px solid var(--primary); font-size: 0.95em; margin-top: 10px; border-radius: 0 4px 4px 0; }
    </style>
</head>
<body>

<div id="app" class="card">
    <div id="view-setup">
        <h2 style="text-align: center;">Kuis Numerasi Trigonometri</h2>
        <input type="text" id="inp-nama" placeholder="Nama Lengkap">
        <select id="inp-kelas"></select>
        <input type="number" id="inp-no" placeholder="No Presensi (1-36)" min="1" max="36">
        <button class="btn-main" onclick="startQuiz()">Mulai Kuis</button>
    </div>

    <div id="view-quiz" class="hidden">
        <div id="progress" style="font-weight: bold; color: var(--primary); margin-bottom: 10px;"></div>
        <div id="question-container"></div>
        <div id="options-container"></div>
    </div>

    <div id="view-result" class="hidden">
        <h2 style="text-align: center;">Kuis Selesai!</h2>
        <div id="final-score" style="text-align: center; font-size: 3.5em; font-weight: bold; color: var(--primary);"></div>
        <p id="status-kirim" style="text-align: center; color: var(--success); font-weight: bold;"></p>
        <hr>
        <h3>Pembahasan Lengkap:</h3>
        <div id="review-list"></div>
        <button class="btn-main" onclick="location.reload()">Kerjakan Ulang</button>
    </div>
</div>

<script>
const rawQuestions = [
    {
        id: 1,
        q: "Jika panjang PQ = 5 cm dan QR = 12 cm, maka nilai \\(\\sin R\\) adalah...",
        svg: `<svg viewBox="0 0 200 120"><path d="M40,20 L40,100 L160,100 Z" fill="none" stroke="black" stroke-width="2"/><rect x="40" y="90" width="10" height="10" fill="none" stroke="black"/><text x="25" y="20">P</text><text x="25" y="115">Q</text><text x="165" y="115">R</text><text x="10" y="65">5</text><text x="90" y="115">12</text></svg>`,
        opts: ["\\(\\frac{5}{13}\\)", "\\(\\frac{12}{13}\\)", "\\(\\frac{5}{12}\\)", "\\(\\frac{13}{5}\\)"],
        correct: "\\(\\frac{5}{13}\\)",
        exp: "Sisi miring \\(PR = \\sqrt{5^2 + 12^2} = \\sqrt{25 + 144} = \\sqrt{169} = 13\\). <br> Maka \\(\\sin R = \\frac{depan}{miring} = \\frac{5}{13}\\)."
    },
    {
        id: 2,
        q: "Jika XY = 6 cm dan XZ = 10 cm, nilai \\(\\tan Z\\) adalah...",
        svg: `<svg viewBox="0 0 200 120"><path d="M40,20 L40,100 L140,100 Z" fill="none" stroke="black" stroke-width="2"/><rect x="40" y="90" width="10" height="10" fill="none" stroke="black"/><text x="35" y="15">X</text><text x="35" y="115">Y</text><text x="145" y="115">Z</text><text x="10" y="65">6</text><text x="95" y="60">10</text></svg>`,
        opts: ["\\(\\frac{6}{8}\\)", "\\(\\frac{8}{6}\\)", "\\(\\frac{6}{10}\\)", "\\(\\frac{8}{10}\\)"],
        correct: "\\(\\frac{6}{8}\\)",
        exp: "Sisi samping \\(YZ = \\sqrt{10^2 - 6^2} = \\sqrt{100 - 36} = \\sqrt{64} = 8\\). <br> Maka \\(\\tan Z = \\frac{depan}{samping} = \\frac{6}{8}\\)."
    },
    {
        id: 3,
        q: "Segitiga ABC siku-siku di A. Jika AC = 6 cm dan \\(\\angle B = 30^\\circ\\), panjang sisi BC adalah...",
        svg: `<svg viewBox="0 0 200 100"><path d="M30,80 L170,80 L30,20 Z" fill="none" stroke="black" stroke-width="2"/><rect x="30" y="70" width="10" height="10" fill="none" stroke="black"/><text x="15" y="85">A</text><text x="175" y="85">B</text><text x="15" y="20">C</text><text x="130" y="75">30°</text></svg>`,
        opts: ["12 cm", "10 cm", "8 cm", "6 cm"],
        correct: "12 cm",
        exp: "Gunakan \\(\\sin 30^\\circ = \\frac{AC}{BC}\\). <br> \\(\\frac{1}{2} = \\frac{6}{BC} \\Rightarrow BC = 12\\) cm."
    },

    // Tambahkan soal 4-7 dengan format yang sama
	{
        id: 4,
        q: "Segitiga ABC siku-siku di A. Jika AB = 12 cm dan \\(\\angle B = 60^\\circ\\), panjang BC adalah...",
        opts: ["\\(24\\text{ cm}\\)", "\\(6\\text{ cm}\\)", "\\(9\\text{ cm}\\)", "\\(12\\text{ cm}\\)", "\\(18\\text{ cm}\\)"],
        correct: "\\(24\\text{ cm}\\)",
        exp: "\\(\\cos 60^\\circ = \\frac{AB}{BC} \\Rightarrow \\frac{1}{2} = \\frac{12}{BC} \\Rightarrow BC = 24\\text{ cm}\\)."
    },
    {
        id: 5,
        q: "Nilai dari \\(2 \\sin 30^\\circ + \\cos 0^\\circ\\) adalah...",
        opts: ["2", "0", "1", "3", "4"],
        correct: "2",
        exp: "\\(2(1/2) + 1 = 1 + 1 = 2\\)."
    },
    {
        id: 7,
        q: "Siswa mengamati puncak pohon. Jarak ke pohon 8m, sudut elevasi 45°, tinggi mata 1,6m. Tinggi pohon adalah...",
        opts: ["\\(9,6\\text{ meter}\\)", "\\(8\\text{ meter}\\)", "\\(8,6\\text{ meter}\\)", "\\(9\\text{ meter}\\)", "\\(10\\text{ meter}\\)"],
        correct: "\\(9,6\\text{ meter}\\)",
        exp: "Tinggi celah = \\(8 \\cdot \\tan 45^\\circ = 8\\text{m}\\). Tinggi pohon = \\(8 + 1,6 = 9,6\\text{m}\\)."
    }
];

let quizData = [];
let currentIdx = 0;
let userAnswers = [];
let biodata = {};

const katexConfig = { delimiters: [{left: '\\(', right: '\\)', display: false}], throwOnError: false };

// Setup Dropdown Kelas
const selectKelas = document.getElementById('inp-kelas');
['X', 'XI'].forEach(t => { for(let i=1; i<=12; i++) { let k = `${t}-${i.toString().padStart(2,'0')}`; selectKelas.add(new Option(k, k)); } });

function startQuiz() {
    biodata = {
        nama: document.getElementById('inp-nama').value,
        kelas: document.getElementById('inp-kelas').value,
        no: document.getElementById('inp-no').value
    };
    if(!biodata.nama || !biodata.no) return alert("Lengkapi data diri!");

    document.getElementById('app').classList.add('fullscreen');
    document.getElementById('view-setup').classList.add('hidden');
    document.getElementById('view-quiz').classList.remove('hidden');
    
    quizData = [...rawQuestions].sort(() => Math.random() - 0.5);
    renderQuestion();
}

function renderQuestion() {
    const item = quizData[currentIdx];
    document.getElementById('progress').innerText = `Soal ${currentIdx + 1} / ${quizData.length}`;
    document.getElementById('question-container').innerHTML = `<p>${item.q}</p>${item.svg || ''}`;
    
    const optArea = document.getElementById('options-container');
    optArea.innerHTML = '';
    item.opts.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'opt-btn';
        btn.innerHTML = opt;
        btn.onclick = () => nextStep(opt);
        optArea.appendChild(btn);
    });
    renderMathInElement(document.getElementById('view-quiz'), katexConfig);
}

function nextStep(selected) {
    const q = quizData[currentIdx];
    userAnswers.push({ q: q.q, selected, correct: q.correct, exp: q.exp, isCorrect: selected === q.correct });

    if(currentIdx < quizData.length - 1) {
        currentIdx++;
        renderQuestion();
    } else {
        finishQuiz();
    }
}

function finishQuiz() {
    const score = (userAnswers.filter(a => a.isCorrect).length / quizData.length) * 100;
    document.getElementById('view-quiz').classList.add('hidden');
    document.getElementById('view-result').classList.remove('hidden');
    document.getElementById('final-score').innerText = score.toFixed(0);

    // 1. Fungsi Kirim Data (Contoh ke WhatsApp)
    const pesan = `NAMA: ${biodata.nama}%0AKELAS: ${biodata.kelas}%0ANO: ${biodata.no}%0ANILAI: ${score}`;
    document.getElementById('status-kirim').innerHTML = `✅ Data Berhasil Direkap!`;
    
    // Opsional: Buka WA otomatis
    // window.open(`https://wa.me/628123456789?text=${pesan}`, '_blank');

    // 2. Tampilkan Review Benar/Salah
    const reviewList = document.getElementById('review-list');
    userAnswers.forEach((ans, i) => {
        const div = document.createElement('div');
        div.className = 'explanation-item';
        div.innerHTML = `
            <span class="status-badge ${ans.isCorrect ? 'status-correct' : 'status-wrong'}">
                ${ans.isCorrect ? 'BENAR ✅' : 'SALAH ❌'}
            </span>
            <div style="margin-bottom:5px"><strong>Soal ${i+1}:</strong> ${ans.q}</div>
            <div style="font-size:0.9em">Jawaban Anda: <b style="color:${ans.isCorrect?'green':'red'}">${ans.selected}</b></div>
            ${!ans.isCorrect ? `<div style="font-size:0.9em">Kunci: <b>${ans.correct}</b></div>` : ''}
            <div class="solution-box"><strong>Pembahasan:</strong><br>${ans.exp}</div>
        `;
        reviewList.appendChild(div);
    });
    renderMathInElement(reviewList, katexConfig);
}
</script>
</body>
</html>
