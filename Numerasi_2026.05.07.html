<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Numerasi X/XI - 2026</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .card { background: white; width: 100%; max-width: 650px; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .hidden { display: none; }
        .fullscreen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1000; background: white; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        svg { max-width: 100%; height: auto; margin: 15px 0; border: 1px solid #eee; border-radius: 8px; background: white; }
        .opt-btn { display: block; width: 100%; text-align: left; padding: 12px; margin: 8px 0; border: 1px solid #e2e8f0; border-radius: 6px; background: white; cursor: pointer; transition: 0.2s; font-size: 1.1em; }
        .opt-btn:hover { background: #eff6ff; border-color: var(--primary); }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; }
        .explanation { background: #f1f5f9; padding: 15px; border-radius: 8px; margin-top: 10px; font-size: 0.9em; line-height: 1.5; }
    </style>
</head>
<body>

<div id="app" class="card">
    <div id="view-setup">
        <h2 style="text-align: center;">Kuis Numerasi Trigonometri</h2>
        <label>Kelas:</label>
        <select id="inp-kelas"></select>
        <input type="number" id="inp-no" placeholder="No Presensi (1-36)" min="1" max="36">
        <input type="text" id="inp-nama" placeholder="Nama Lengkap">
        <button class="btn-main" onclick="startQuiz()">Mulai & Fullscreen</button>
    </div>

    <div id="view-quiz" class="hidden">
        <div id="progress" style="font-size: 0.8em; color: #666; margin-bottom: 10px;"></div>
        <div id="question-container"></div>
        <div id="options-container"></div>
    </div>

    <div id="view-result" class="hidden">
        <h2 style="text-align: center;">Kuis Selesai!</h2>
        <div id="final-score" style="text-align: center; font-size: 2em; font-weight: bold; color: var(--primary);"></div>
        <hr>
        <h3>Pembahasan Soal:</h3>
        <div id="explanations-list"></div>
        <button class="btn-main" style="margin-top:20px" onclick="location.reload()">Tutup</button>
    </div>
</div>

<script>
// Database Soal - Menambahkan pembatas \\( \\) pada opsi agar pasti terender
const rawQuestions = [
    {
        id: 1,
        q: "Perhatikan gambar segitiga PQR di bawah ini. Jika panjang PQ = 5 cm dan QR = 12 cm, maka nilai \\(\\sin R\\) adalah...",
        svg: `<svg viewBox="0 0 200 120"><path d="M40,20 L40,100 L160,100 Z" fill="none" stroke="black" stroke-width="2"/><rect x="40" y="90" width="10" height="10" fill="none" stroke="black"/><text x="25" y="20">P</text><text x="25" y="115">Q</text><text x="165" y="115">R</text><text x="15" y="65">5 cm</text><text x="85" y="115">12 cm</text></svg>`,
        opts: ["\\(\\frac{5}{13}\\)", "\\(\\frac{12}{13}\\)", "\\(\\frac{5}{12}\\)", "\\(\\frac{12}{5}\\)", "\\(\\frac{13}{5}\\)"],
        correct: "\\(\\frac{5}{13}\\)",
        exp: "Sisi miring \\(PR = \\sqrt{5^2 + 12^2} = 13\\). \\(\\sin R = \\frac{\\text{depan}}{\\text{miring}} = \\frac{5}{13}\\)."
    },
    {
        id: 2,
        q: "Perhatikan gambar segitiga XYZ. Jika XY = 6 cm dan XZ = 10 cm, nilai \\(\\tan Z\\) adalah...",
        svg: `<svg viewBox="0 0 200 120"><path d="M40,20 L40,100 L140,100 Z" fill="none" stroke="black" stroke-width="2"/><rect x="40" y="90" width="10" height="10" fill="none" stroke="black"/><text x="35" y="15">X</text><text x="35" y="115">Y</text><text x="145" y="115">Z</text><text x="10" y="65">6 cm</text><text x="95" y="60">10 cm</text></svg>`,
        opts: ["\\(\\frac{6}{8}\\)", "\\(\\frac{6}{10}\\)", "\\(\\frac{8}{10}\\)", "\\(\\frac{10}{6}\\)", "\\(\\frac{10}{8}\\)"],
        correct: "\\(\\frac{6}{8}\\)",
        exp: "Sisi samping \\(YZ = \\sqrt{10^2 - 6^2} = 8\\). \\(\\tan Z = \\frac{\\text{depan}}{\\text{samping}} = \\frac{6}{8}\\)."
    },
    {
        id: 3,
        q: "Segitiga ABC siku-siku di A. Jika AC = 6 cm dan \\(\\angle B = 30^\\circ\\), panjang sisi BC adalah...",
        svg: `<svg viewBox="0 0 200 100"><path d="M30,80 L170,80 L30,20 Z" fill="none" stroke="black" stroke-width="2"/><rect x="30" y="70" width="10" height="10" fill="none" stroke="black"/><text x="15" y="85">A</text><text x="175" y="85">B</text><text x="15" y="20">C</text><text x="5" y="55">6 cm</text><text x="130" y="75">30°</text></svg>`,
        opts: ["\\(12\\text{ cm}\\)", "\\(13\\text{ cm}\\)", "\\(14\\text{ cm}\\)", "\\(15\\text{ cm}\\)", "\\(16\\text{ cm}\\)"],
        correct: "\\(12\\text{ cm}\\)",
        exp: "\\(\\sin 30^\\circ = \\frac{AC}{BC} \\Rightarrow \\frac{1}{2} = \\frac{6}{BC} \\Rightarrow BC = 12\\text{ cm}\\)."
    },
    {
        id: 4,
        q: "Segitiga ABC siku-siku di A. Jika AB = 12 cm dan \\(\\angle B = 60^\\circ\\), panjang BC adalah...",
        opts: ["\\(24\\text{ cm}\\)", "\\(6\\text{ cm}\\)", "\\(9\\text{ cm}\\)", "\\(12\\text{ cm}\\)", "\\(18\\text{ cm}\\)"],
        correct: "\\(24\\text{ cm}\\)",
        exp: "\\(\\cos 60^\\circ = \\frac{AB}{BC} \\Rightarrow \\frac{1}{2} = \\frac{12}{BC} \\Rightarrow BC = 24\\text{ cm}\\)."
    },
    {
        id: 5,
        q: "Nilai dari \\(2 \\sin 30^\\circ + \\cos 0^\\circ\\) adalah...",
        opts: ["2", "0", "1", "3", "4"],
        correct: "2",
        exp: "\\(2(1/2) + 1 = 1 + 1 = 2\\)."
    },
    {
        id: 7,
        q: "Siswa mengamati puncak pohon. Jarak ke pohon 8m, sudut elevasi 45°, tinggi mata 1,6m. Tinggi pohon adalah...",
        opts: ["\\(9,6\\text{ meter}\\)", "\\(8\\text{ meter}\\)", "\\(8,6\\text{ meter}\\)", "\\(9\\text{ meter}\\)", "\\(10\\text{ meter}\\)"],
        correct: "\\(9,6\\text{ meter}\\)",
        exp: "Tinggi celah = \\(8 \\cdot \\tan 45^\\circ = 8\\text{m}\\). Tinggi pohon = \\(8 + 1,6 = 9,6\\text{m}\\)."
    }
];

let quizData = [];
let currentIdx = 0;
let userAnswers = [];
const GAS_URL = "https://script.google.com/macros/s/AKfycbydiCJmxb0_uSl8Ta0dW33v8T8bYd4bogfUAXSNCGzSNhSNIAwM0nBrtoSaXF21Tjbn/exec";

// Konfigurasi Render KaTeX
const katexConfig = {
    delimiters: [
        {left: '$$', right: '$$', display: true},
        {left: '\\(', right: '\\)', display: false},
        {left: '\\[', right: '\\]', display: true}
    ],
    throwOnError: false
};

const selectKelas = document.getElementById('inp-kelas');
['X', 'XI'].forEach(tingkat => {
    for(let i=1; i<=12; i++) {
        let k = `${tingkat}-${i.toString().padStart(2, '0')}`;
        selectKelas.add(new Option(k, k));
    }
});

function shuffle(array) {
    return array.sort(() => Math.random() - 0.5);
}

function startQuiz() {
    const nama = document.getElementById('inp-nama').value;
    const no = document.getElementById('inp-no').value;
    if(!nama || !no) return alert("Isi data diri!");

    document.getElementById('app').classList.add('fullscreen');
    document.getElementById('view-setup').classList.add('hidden');
    document.getElementById('view-quiz').classList.remove('hidden');
    
    quizData = shuffle([...rawQuestions]).map(item => ({
        ...item,
        opts: shuffle([...item.opts])
    }));
    
    renderQuestion();
}

function renderQuestion() {
    const item = quizData[currentIdx];
    document.getElementById('progress').innerText = `Soal ${currentIdx + 1} dari ${quizData.length}`;
    document.getElementById('question-container').innerHTML = `<div>${item.q}</div>${item.svg || ''}`;
    
    const optArea = document.getElementById('options-container');
    optArea.innerHTML = '';
    item.opts.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'opt-btn';
        btn.innerHTML = opt;
        btn.onclick = () => handleAnswer(opt);
        optArea.appendChild(btn);
    });
    
    // Memanggil render ulang setiap kali konten berubah
    renderMathInElement(document.getElementById('view-quiz'), katexConfig);
}

function handleAnswer(selected) {
    userAnswers.push({
        questionId: quizData[currentIdx].id,
        isCorrect: selected === quizData[currentIdx].correct
    });
    
    if(currentIdx < quizData.length - 1) {
        currentIdx++;
        renderQuestion();
    } else {
        submitQuiz();
    }
}

async function submitQuiz() {
    const score = (userAnswers.filter(a => a.isCorrect).length / quizData.length) * 100;
    const payload = {
        kelas: document.getElementById('inp-kelas').value,
        no: document.getElementById('inp-no').value,
        nama: document.getElementById('inp-nama').value,
        nilai: score.toFixed(1)
    };

    document.getElementById('view-quiz').innerHTML = "<p>Sedang mengirim nilai...</p>";

    try {
        await fetch(GAS_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(payload)
        });
    } catch (e) { console.error(e); }

    showResults(score);
}

function showResults(score) {
    document.getElementById('view-quiz').classList.add('hidden');
    document.getElementById('view-result').classList.remove('hidden');
    document.getElementById('final-score').innerText = score.toFixed(1);
    
    const expList = document.getElementById('explanations-list');
    expList.innerHTML = ''; 
    rawQuestions.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = 'explanation';
        div.innerHTML = `<strong>Soal ${i+1}:</strong><br>${item.exp}`;
        expList.appendChild(div);
    });
    renderMathInElement(expList, katexConfig);
}
</script>
</body>
</html>
